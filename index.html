<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GPS Bridge</title>
</head>
<body>
    <p>📡 Localisation en cours, veuillez patienter...</p>
    <script>
        navigator.geolocation.getCurrentPosition(function(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            // On renvoie vers votre page Free avec les coordonnées
            window.location.href = "http://christ.mingam.free.fr/stationnement.php?lat=" + lat + "&lon=" + lon;
        }, function(error) {
            alert("Erreur GPS : " + error.message);
            window.location.href = "http://christ.mingam.free.fr/stationnement.php";
        }, {
            enableHighAccuracy: true // Pour avoir la précision maximale
        });
    </script>
</body>
</html>
